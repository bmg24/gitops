# DynaKube custom resource for the GKE playground cluster.
# Single full-stack DynaKube: cloudNativeFullStack OneAgent + one ActiveGate.
#
# IMAGE SOURCE (important): this sprint/internal tenant's built-in registry
# (anr47691.sprint.dynatracelabs.com/linux/...) does NOT host the agent/AG/EEC
# container images — every manifest tag 404s. Dynatrace also recommends AGAINST
# using the built-in registry for images. So we pull OneAgent / CodeModules /
# ActiveGate from the public Amazon ECR registry instead (same source the OTel
# collector already used successfully). Public ECR is anonymous → no pull secret.
#   https://docs.dynatrace.com/docs/ingest-from/setup-on-k8s/guides/container-registries/use-public-registry
#
# EEC NOTE: dynatrace-eec is NOT published to the public registry, so the
# extensions / extensionExecutionController / otelCollector / telemetryIngest
# features (which need EEC) are intentionally REMOVED here. Core full-stack
# (hosts, processes, K8s, services/traces) does not need them. Re-add later only
# if you have an EEC image source (e.g. the built-in registry once populated, or
# a private mirror).
#
# TAGS: public ECR uses immutable version tags (no `latest`). Pin to a real
# available tag — list them with:
#   skopeo list-tags docker://public.ecr.aws/dynatrace/dynatrace-oneagent
#   skopeo list-tags docker://public.ecr.aws/dynatrace/dynatrace-activegate
#   (or browse https://gallery.ecr.aws/dynatrace)
# Replace REPLACE_WITH_AVAILABLE_TAG below with the newest tag (same tag works
# for oneagent + codemodules; activegate has its own tag).
#
# NOTE: the token Secret ("brian-obs-playground") is created by hand (see
# ../setup.md), gitignored, and ArgoCD applies only this CR.
---
apiVersion: dynatrace.com/v1beta6
kind: DynaKube
metadata:
  name: brian-obs-playground
  namespace: dynatrace
  labels:
    dynatrace.com/created-by: "dynatrace.kubernetes"
# https://docs.dynatrace.com/docs/ingest-from/setup-on-k8s/reference/dynakube-parameters
spec:
  apiUrl: https://anr47691.sprint.dynatracelabs.com/api
  tokens: brian-obs-playground
  networkZone: gke
  oneAgent:
    hostGroup: gke
    cloudNativeFullStack:
      # Pull from public ECR instead of the (empty) built-in registry.
      image: public.ecr.aws/dynatrace/dynatrace-oneagent:1.339.55.20260615-110349
      codeModulesImage: public.ecr.aws/dynatrace/dynatrace-codemodules:1.339.55.20260615-110349
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
  activeGate:
    capabilities:
      - kubernetes-monitoring
      - routing
      - debugging
    # Pull from public ECR instead of the (empty) built-in registry.
    image: public.ecr.aws/dynatrace/dynatrace-activegate:1.339.39.20260605-153224
    resources:
      requests:
        cpu: 1000m
        memory: 10Gi
      limits:
        cpu: 2000m
        memory: 10Gi
    replicas: 1
